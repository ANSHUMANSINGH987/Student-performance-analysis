<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aetheris Dashboard{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #fdfbf7;
            --bg-secondary: #ffffff;
            --text-main: #000000;
            --text-muted: #333333;
            --border-color: #000000;
            --border-width: 3px;
            --shadow-hard: 6px 6px 0px #000000;
            --shadow-hover: 2px 2px 0px #000000;
            
            --brutal-yellow: #facc15;
            --brutal-blue: #3b82f6;
            --brutal-red: #ef4444;
            --brutal-green: #22c55e;
            --brutal-pink: #ec4899;
            --brutal-purple: #a855f7;
            --brutal-orange: #f97316;
            
            --success: var(--brutal-green);
            --warning: var(--brutal-yellow);
            --danger: var(--brutal-red);
            --accent: var(--brutal-blue);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d1d5db 2px, transparent 2px);
            background-size: 24px 24px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        h1, h2, h3, h4, h5, h6, .brand {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        a { text-decoration: none; color: inherit; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-left: var(--border-width) solid var(--border-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); }
        ::-webkit-scrollbar-thumb:hover { background: var(--brutal-blue); }

        /* Layout */
        .dashboard {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--brutal-blue);
            border-right: var(--border-width) solid var(--border-color);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 3rem;
            text-shadow: 2px 2px 0px #000;
        }

        .brand i {
            color: var(--brutal-yellow);
            font-size: 1.8rem;
            text-shadow: 2px 2px 0px #000;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 1rem 1.25rem;
            border-radius: 0;
            border: var(--border-width) solid transparent;
            color: #fff;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-link:hover {
            background-color: #fff;
            color: #000;
            border-color: #000;
            box-shadow: 4px 4px 0px #000;
            transform: translate(-2px, -2px);
        }

        .nav-link.active {
            background-color: var(--brutal-yellow);
            color: #000;
            border-color: #000;
            box-shadow: 4px 4px 0px #000;
            transform: translate(-2px, -2px);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2.5rem 3.5rem;
            overflow-y: auto;
            position: relative;
        }
        
        /* Brutalist Cards (reusing .glass-card class name for compatibility) */
        .glass-card {
            background-color: var(--bg-secondary);
            border: var(--border-width) solid var(--border-color);
            border-radius: 0;
            padding: 2rem;
            box-shadow: var(--shadow-hard);
            transition: all 0.2s ease-in-out;
            position: relative;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .glass-card:hover {
            transform: translate(2px, 2px);
            box-shadow: var(--shadow-hover);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-10px, -10px); }
            to { opacity: 1; transform: translate(0, 0); }
        }

        .card-title {
            font-size: 2rem;
            color: #000;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 0px var(--brutal-yellow);
        }

        .card-subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.5;
        }

        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.75rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .form-group.full { grid-column: 1 / -1; }

        label {
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            color: #000;
        }

        input, select {
            width: 100%;
            padding: 1rem 1.25rem;
            background-color: #fff;
            border: var(--border-width) solid var(--border-color);
            border-radius: 0;
            color: #000;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: inset 3px 3px 0px rgba(0,0,0,0.05);
        }

        input:hover, select:hover {
            background-color: #f9fafb;
        }

        input:focus, select:focus {
            outline: none;
            background-color: #fff;
            box-shadow: 4px 4px 0px var(--brutal-pink);
            border-color: var(--border-color);
        }

        select option {
            background: #fff;
            color: #000;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 1.25rem;
            margin-top: 2.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 1rem 2rem;
            border-radius: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            border: var(--border-width) solid var(--border-color);
            transition: all 0.2s ease-in-out;
            box-shadow: 4px 4px 0px var(--border-color);
        }

        .btn-primary {
            background-color: var(--brutal-yellow);
            color: #000;
        }

        .btn-primary:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border-color);
            background-color: #eab308;
        }

        .btn-secondary {
            background-color: #fff;
            color: #000;
        }

        .btn-secondary:hover {
            background-color: #f3f4f6;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border-color);
        }

        /* Alerts & Results */
        .alert {
            margin-top: 1.5rem;
            padding: 1.25rem 1.5rem;
            border: var(--border-width) solid var(--border-color);
            background-color: var(--brutal-green);
            color: #000;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-hard);
            font-weight: 600;
        }

        .result-display {
            margin-top: 2.5rem;
            padding: 2.5rem;
            background-color: var(--brutal-purple);
            border: var(--border-width) solid var(--border-color);
            box-shadow: var(--shadow-hard);
            text-align: center;
            position: relative;
        }

        .result-value {
            font-size: 4.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
            line-height: 1;
            font-family: 'Space Grotesk', sans-serif;
            text-shadow: 4px 4px 0px #000;
        }

        .result-label {
            color: #000;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .dashboard { flex-direction: column; }
            .sidebar { width: 100%; padding: 1.5rem; border-right: none; border-bottom: var(--border-width) solid var(--border-color); }
            .main-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <a href="{{ url_for('index') }}" class="brand">
                <i class="fa-solid fa-chart-line"></i>
                <span>EduMetrics</span>
            </a>
            <nav class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
                <a href="{{ url_for('predict_datapoint') }}" class="nav-link {% if request.endpoint == 'predict_datapoint' %}active{% endif %}">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Predict Score
                </a>
                <a href="{{ url_for('analytics') }}" class="nav-link {% if request.endpoint == 'analytics' %}active{% endif %}">
                    <i class="fa-solid fa-chart-pie"></i> Analytics
                </a>
                <a href="{{ url_for('train_model') }}" class="nav-link">
                    <i class="fa-solid fa-gear"></i> Train Model
                </a>
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
